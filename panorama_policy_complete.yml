---
- hosts: all
  connection: local
  gather_facts: true
  name: Complete Policy Creation - Objects, Groups, and Rules

  vars_files:
    - panorama_vars.yml

  tasks:

    # ============================================================
    # STEP 0: Ensure the "Automated" tag exists in Panorama
    # ============================================================
    - name: Create "Automated" tag if it doesn't exist
      paloaltonetworks.panos.panos_tag_object:
        provider: "{{ provider }}"
        device_group: "{{ panorama_device_group }}"
        name: "Automated"
        color: "blue"
        commit: false
      register: tag_created

    - name: Display tag creation status
      debug:
        msg: >
          Tag 'Automated': 
          {{ 'Created' if tag_created.changed else 'Already exists or skipped' }}

    # ============================================================
    # STEP 1: Check and Create SOURCE ADDRESS OBJECT
    # ============================================================
    - name: Gather all address objects
      paloaltonetworks.panos.panos_address_object:
        provider: "{{ provider }}"
        device_group: "{{ panorama_device_group }}"
        state: gathered
        gathered_filter: '*'
      register: all_address_objects

    - name: Create source address objects if missing
      paloaltonetworks.panos.panos_address_object:
        provider: "{{ provider }}"
        state: present
        device_group: "{{ panorama_device_group }}"
        name: "{{ source_object_name }}_{{ item }}"
        value: "{{ (source_ip if source_ip is not string else [source_ip])[item] }}"
        description: "Web Tier Subnet - Auto Created ({{ (source_ip if source_ip is not string else [source_ip])[item] }})"
        tag:
          - "Automated"
        commit: false
      loop: "{{ range((source_ip if source_ip is not string else [source_ip]) | length) | list }}"
      register: source_objects_created

    - name: Display source objects creation status
      debug:
        msg: "Source objects created: {{ source_objects_created.results | selectattr('changed', 'equalto', true) | map(attribute='item') | list }}"

    # ============================================================
    # STEP 2: Check and Create DESTINATION ADDRESS OBJECT
    # ============================================================
    - name: Create destination address objects if missing
      paloaltonetworks.panos.panos_address_object:
        provider: "{{ provider }}"
        state: present
        device_group: "{{ panorama_device_group }}"
        name: "{{ destination_object_name }}_{{ item }}"
        value: "{{ (destination_ip if destination_ip is not string else [destination_ip])[item] }}"
        description: "Database Tier Subnet - Auto Created ({{ (destination_ip if destination_ip is not string else [destination_ip])[item] }})"
        tag:
          - "Automated"
        commit: false
      loop: "{{ range((destination_ip if destination_ip is not string else [destination_ip]) | length) | list }}"
      register: destination_objects_created

    - name: Display destination objects creation status
      debug:
        msg: "Destination objects created: {{ destination_objects_created.results | selectattr('changed', 'equalto', true) | map(attribute='item') | list }}"

    # ============================================================
    # STEP 3: Check and Create SOURCE ADDRESS GROUP
    # ============================================================
    - name: Gather all address groups
      paloaltonetworks.panos.panos_address_group:
        provider: "{{ provider }}"
        device_group: "{{ panorama_device_group }}"
        state: gathered
        gathered_filter: '*'
      register: all_address_groups

    - name: Check if source address group exists
      set_fact:
        source_group_exists: "{{ all_address_groups.gathered | selectattr('name', 'equalto', source_group_name) | list | length > 0 }}"

    - name: Create source address group if missing
      paloaltonetworks.panos.panos_address_group:
        provider: "{{ provider }}"
        state: present
        device_group: "{{ panorama_device_group }}"
        name: "{{ source_group_name }}"
        static_value: "{{ range((source_ip if source_ip is not string else [source_ip]) | length) | map('string') | map('regex_replace', '^(.*)$', source_object_name ~ '_\\1') | list }}"
        description: "Web to Database Source Group - Auto Created"
        tag:
          - "Automated"
        commit: false
      when: not source_group_exists
      register: source_group_created

    - name: Display source group creation status
      debug:
        msg: >
          Source group '{{ source_group_name }}': 
          {{ 'Created' if source_group_created.changed else 'Already exists' }}

    # ============================================================
    # STEP 4: Check and Create DESTINATION ADDRESS GROUP
    # ============================================================
    - name: Check if destination address group exists
      set_fact:
        destination_group_exists: "{{ all_address_groups.gathered | selectattr('name', 'equalto', destination_group_name) | list | length > 0 }}"

    - name: Create destination address group if missing
      paloaltonetworks.panos.panos_address_group:
        provider: "{{ provider }}"
        state: present
        device_group: "{{ panorama_device_group }}"
        name: "{{ destination_group_name }}"
        static_value: "{{ range((destination_ip if destination_ip is not string else [destination_ip]) | length) | map('string') | map('regex_replace', '^(.*)$', destination_object_name ~ '_\\1') | list }}"
        description: "Web to Database Destination Group - Auto Created"
        tag:
          - "Automated"
        commit: false
      when: not destination_group_exists
      register: destination_group_created

    - name: Display destination group creation status
      debug:
        msg: >
          Destination group '{{ destination_group_name }}':
          {{ 'Created' if destination_group_created.changed else 'Already exists' }}

    # ============================================================
    # STEP 4.5: VALIDATE OBJECTS AND GROUPS
    # ============================================================
    - name: Gather all address objects (for validation)
      paloaltonetworks.panos.panos_address_object:
        provider: "{{ provider }}"
        device_group: "{{ panorama_device_group }}"
        state: gathered
        gathered_filter: '*'
      register: all_address_objects_validation

    - name: Gather all address groups (for validation)
      paloaltonetworks.panos.panos_address_group:
        provider: "{{ provider }}"
        device_group: "{{ panorama_device_group }}"
        state: gathered
        gathered_filter: '*'
      register: all_address_groups_validation

    - name: Validate source objects exist
      set_fact:
        expected_source_objects: "{{ range((source_ip if source_ip is not string else [source_ip]) | length) | map('string') | map('regex_replace', '^(.*)$', source_object_name ~ '_\\\\1') | list }}"
        actual_source_objects: "{{ all_address_objects_validation.gathered | map(attribute='name') | list }}"

    - name: Validate destination objects exist
      set_fact:
        expected_destination_objects: "{{ range((destination_ip if destination_ip is not string else [destination_ip]) | length) | map('string') | map('regex_replace', '^(.*)$', destination_object_name ~ '_\\\\1') | list }}"
        actual_destination_objects: "{{ all_address_objects_validation.gathered | map(attribute='name') | list }}"

    - name: Check source group membership
      set_fact:
        source_group_members: "{{ (all_address_groups_validation.gathered | selectattr('name', 'equalto', source_group_name) | first).static_value | default([]) }}"
        expected_source_group_members: "{{ expected_source_objects }}"

    - name: Check destination group membership
      set_fact:
        destination_group_members: "{{ (all_address_groups_validation.gathered | selectattr('name', 'equalto', destination_group_name) | first).static_value | default([]) }}"
        expected_destination_group_members: "{{ expected_destination_objects }}"

    - name: Report validation results
      debug:
        msg: |
          ========================================
          OBJECT AND GROUP VALIDATION REPORT
          ========================================
          SOURCE OBJECTS:
          Expected: {{ expected_source_objects }}
          Found: {{ expected_source_objects | intersect(actual_source_objects) }}
          Missing: {{ expected_source_objects | difference(actual_source_objects) }}

          DESTINATION OBJECTS:
          Expected: {{ expected_destination_objects }}
          Found: {{ expected_destination_objects | intersect(actual_destination_objects) }}
          Missing: {{ expected_destination_objects | difference(actual_destination_objects) }}

          SOURCE GROUP '{{ source_group_name }}':
          Expected members: {{ expected_source_group_members }}
          Actual members: {{ source_group_members }}
          Missing from group: {{ expected_source_group_members | difference(source_group_members) }}
          Extra in group: {{ source_group_members | difference(expected_source_group_members) }}
          Status: {{ 'EMPTY GROUP!' if source_group_members | length == 0 else 'OK' }}

          DESTINATION GROUP '{{ destination_group_name }}':
          Expected members: {{ expected_destination_group_members }}
          Actual members: {{ destination_group_members }}
          Missing from group: {{ expected_destination_group_members | difference(destination_group_members) }}
          Extra in group: {{ destination_group_members | difference(expected_destination_group_members) }}
          Status: {{ 'EMPTY GROUP!' if destination_group_members | length == 0 else 'OK' }}
          ========================================

    - name: Warn if groups are empty
      debug:
        msg: "WARNING: '{{ source_group_name }}' is empty! Check object creation and group assignment."
      when: source_group_members | length == 0

    - name: Warn if destination group is empty
      debug:
        msg: "WARNING: '{{ destination_group_name }}' is empty! Check object creation and group assignment."
      when: destination_group_members | length == 0

    # ============================================================
    # STEP 5: Check and Create APPLICATION GROUP
    # ============================================================
    - name: Gather all application groups
      paloaltonetworks.panos.panos_application_group:
        provider: "{{ provider }}"
        device_group: "{{ panorama_device_group }}"
        state: gathered
        gathered_filter: '*'
      register: all_application_groups

    - name: Check if application group exists
      set_fact:
        application_group_exists: "{{ all_application_groups.gathered | selectattr('name', 'equalto', application_group_name) | list | length > 0 }}"

    - name: Create application group if missing
      paloaltonetworks.panos.panos_application_group:
        provider: "{{ provider }}"
        state: present
        device_group: "{{ panorama_device_group }}"
        name: "{{ application_group_name }}"
        value:
          - "web-browsing"
      when: not application_group_exists
      register: application_group_created

    - name: Display application group creation status
      debug:
        msg: >
          Application group '{{ application_group_name }}': 
          {{ 'Created' if application_group_created.changed else 'Already exists' }}

    # ============================================================
    # STEP 6: Check and Create SECURITY RULES
    # ============================================================
    - name: Gather all security rules
      paloaltonetworks.panos.panos_security_rule:
        provider: "{{ provider }}"
        device_group: "{{ panorama_device_group }}"
        rulebase: "{{ panorama_rulebase }}"
        state: gathered
        gathered_filter: '*'
      register: all_security_rules

    - name: Create security rules if missing
      paloaltonetworks.panos.panos_security_rule:
        provider: "{{ provider }}"
        state: present
        device_group: "{{ panorama_device_group }}"
        rulebase: "{{ panorama_rulebase }}"
        rule_name: "{{ item.rule_name }}"
        source_zone: "{{ item.source_zone }}"
        destination_zone: "{{ item.destination_zone }}"
        source_ip: "{{ item.source_ip }}"
        destination_ip: "{{ item.destination_ip }}"
        application: "{{ item.application }}"
        service: "{{ item.service }}"
        action: "{{ item.action }}"
        description: "{{ item.description }}"
        tag_name: "{{ item.tag_name }}"
        commit: false
      loop: "{{ rules }}"
      when: not (all_security_rules.gathered | selectattr('rule_name', 'equalto', item.rule_name) | list | length > 0)
      register: security_rules_created

    - name: Display security rules creation status
      debug:
        msg: "Security rules processed: {{ security_rules_created.results | map(attribute='item.rule_name') | list }} - Created: {{ security_rules_created.results | selectattr('changed', 'equalto', true) | map(attribute='item.rule_name') | list }}"

    # ============================================================
    # STEP 7: COMMIT CHANGES TO PANORAMA
    # ============================================================
    - name: Commit changes to Panorama
      paloaltonetworks.panos.panos_commit_panorama:
        provider: "{{ provider }}"
        description: "Auto-created policy objects and rules"
      register: panorama_commit_result

    - name: Display Panorama commit status
      debug:
        msg: >
          Panorama commit: 
          {{ 'Success' if panorama_commit_result.changed else 'No changes to commit' }}

    # ============================================================
    # STEP 8: PUSH CHANGES TO DEVICE GROUP
    # ============================================================
    - name: Push changes to device group
      paloaltonetworks.panos.panos_commit_push:
        provider: "{{ provider }}"
        style: "device group"
        name: "{{ panorama_device_group }}"
      register: device_group_push_result

    - name: Display device group push status
      debug:
        msg: >
          Device group '{{ panorama_device_group }}' push: 
          {{ 'Success' if device_group_push_result.changed else 'No changes to push' }}

    # ============================================================
    # SUMMARY
    # ============================================================
    - name: Policy Creation Summary
      debug:
        msg: |
          ========================================
          POLICY CREATION & DEPLOYMENT SUMMARY
          ========================================
          Source Objects: {{ source_objects_created.results | selectattr('changed', 'equalto', true) | list | length }} created
          Destination Objects: {{ destination_objects_created.results | selectattr('changed', 'equalto', true) | list | length }} created
          Source Group: {{ source_group_created.changed | default(false) }}
          Destination Group: {{ destination_group_created.changed | default(false) }}
          Application Group: {{ application_group_created.changed | default(false) }}
          Security Rules: {{ security_rules_created.results | selectattr('changed', 'equalto', true) | list | length }} created
          ========================================
          Panorama Commit: {{ panorama_commit_result.changed | default(false) }}
          Device Group Push: {{ device_group_push_result.changed | default(false) }}
          ========================================
