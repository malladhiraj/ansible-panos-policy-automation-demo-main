---
- hosts: all
  connection: local
  gather_facts: true
  name: Complete Policy Creation - Objects, Groups, and Rules

  vars_files:
    - panorama_vars.yml

  tasks:

    # ============================================================
    # STEP 0: Ensure the "Automated" tag exists in Panorama
    # ============================================================
    - name: Create "Automated" tag if it doesn't exist
      paloaltonetworks.panos.panos_tag_object:
        provider: "{{ provider }}"
        device_group: "{{ panorama_device_group }}"
        name: "Automated"
        color: "blue"
        commit: false
      register: tag_created

    - name: Display tag creation status
      debug:
        msg: >
          Tag 'Automated': 
          {{ 'Created' if tag_created.changed else 'Already exists or skipped' }}

    # ============================================================
    # STEP 1: Check and Create SOURCE ADDRESS OBJECT
    # ============================================================
    - name: Gather all address objects
      paloaltonetworks.panos.panos_address_object:
        provider: "{{ provider }}"
        device_group: "{{ panorama_device_group }}"
        state: gathered
        gathered_filter: '*'
      register: all_address_objects

    - name: Check if source address object exists
      set_fact:
        source_object_exists: "{{ all_address_objects.gathered | selectattr('name', 'equalto', source_object_name) | list | length > 0 }}"

    - name: Create source address object if missing
      paloaltonetworks.panos.panos_address_object:
        provider: "{{ provider }}"
        state: present
        device_group: "{{ panorama_device_group }}"
        name: "{{ source_object_name }}"
        value: "{{ source_ip }}"
        description: "Web Tier Subnet - Auto Created"
        tag:
          - "Automated"
        commit: false
      when: not source_object_exists
      register: source_object_created

    - name: Display source object creation status
      debug:
        msg: >
          Source object '{{ source_object_name }}': 
          {{ 'Created' if source_object_created.changed else 'Already exists' }}

    # ============================================================
    # STEP 2: Check and Create DESTINATION ADDRESS OBJECT
    # ============================================================
    - name: Check if destination address object exists
      set_fact:
        destination_object_exists: "{{ all_address_objects.gathered | selectattr('name', 'equalto', destination_object_name) | list | length > 0 }}"

    - name: Create destination address object if missing
      paloaltonetworks.panos.panos_address_object:
        provider: "{{ provider }}"
        state: present
        device_group: "{{ panorama_device_group }}"
        name: "{{ destination_object_name }}"
        value: "{{ destination_ip }}"
        description: "Database Tier Subnet - Auto Created"
        tag:
          - "Automated"
        commit: false
      when: not destination_object_exists
      register: destination_object_created

    - name: Display destination object creation status
      debug:
        msg: >
          Destination object '{{ destination_object_name }}': 
          {{ 'Created' if destination_object_created.changed else 'Already exists' }}

    # ============================================================
    # STEP 3: Check and Create SOURCE ADDRESS GROUP
    # ============================================================
    - name: Gather all address groups
      paloaltonetworks.panos.panos_address_group:
        provider: "{{ provider }}"
        device_group: "{{ panorama_device_group }}"
        state: gathered
        gathered_filter: '*'
      register: all_address_groups

    - name: Check if source address group exists
      set_fact:
        source_group_exists: "{{ all_address_groups.gathered | selectattr('name', 'equalto', source_group_name) | list | length > 0 }}"

    - name: Create source address group if missing
      paloaltonetworks.panos.panos_address_group:
        provider: "{{ provider }}"
        state: present
        device_group: "{{ panorama_device_group }}"
        name: "{{ source_group_name }}"
        static_value:
          - "{{ source_object_name }}"
        description: "Web to Database Source Group - Auto Created"
        tag:
          - "Automated"
        commit: false
      when: not source_group_exists
      register: source_group_created

    - name: Display source group creation status
      debug:
        msg: >
          Source group '{{ source_group_name }}': 
          {{ 'Created' if source_group_created.changed else 'Already exists' }}

    # ============================================================
    # STEP 4: Check and Create DESTINATION ADDRESS GROUP
    # ============================================================
    - name: Check if destination address group exists
      set_fact:
        destination_group_exists: "{{ all_address_groups.gathered | selectattr('name', 'equalto', destination_group_name) | list | length > 0 }}"

    - name: Create destination address group if missing
      paloaltonetworks.panos.panos_address_group:
        provider: "{{ provider }}"
        state: present
        device_group: "{{ panorama_device_group }}"
        name: "{{ destination_group_name }}"
        static_value:
          - "{{ destination_object_name }}"
        description: "Web to Database Destination Group - Auto Created"
        tag:
          - "Automated"
        commit: false
      when: not destination_group_exists
      register: destination_group_created

    - name: Display destination group creation status
      debug:
        msg: >
          Destination group '{{ destination_group_name }}': 
          {{ 'Created' if destination_group_created.changed else 'Already exists' }}

    # ============================================================
    # STEP 5: Check and Create APPLICATION GROUP
    # ============================================================
    - name: Gather all application groups
      paloaltonetworks.panos.panos_application_group:
        provider: "{{ provider }}"
        device_group: "{{ panorama_device_group }}"
        state: gathered
        gathered_filter: '*'
      register: all_application_groups

    - name: Check if application group exists
      set_fact:
        application_group_exists: "{{ all_application_groups.gathered | selectattr('name', 'equalto', application_group_name) | list | length > 0 }}"

    - name: Create application group if missing
      paloaltonetworks.panos.panos_application_group:
        provider: "{{ provider }}"
        state: present
        device_group: "{{ panorama_device_group }}"
        name: "{{ application_group_name }}"
        value:
          - "web-browsing"
      when: not application_group_exists
      register: application_group_created

    - name: Display application group creation status
      debug:
        msg: >
          Application group '{{ application_group_name }}': 
          {{ 'Created' if application_group_created.changed else 'Already exists' }}

    # ============================================================
    # STEP 6: Check and Create SECURITY RULES
    # ============================================================
    - name: Gather all security rules
      paloaltonetworks.panos.panos_security_rule:
        provider: "{{ provider }}"
        device_group: "{{ panorama_device_group }}"
        rulebase: "{{ panorama_rulebase }}"
        state: gathered
        gathered_filter: '*'
      register: all_security_rules

    - name: Create security rules if missing
      paloaltonetworks.panos.panos_security_rule:
        provider: "{{ provider }}"
        state: present
        device_group: "{{ panorama_device_group }}"
        rulebase: "{{ panorama_rulebase }}"
        rule_name: "{{ item.rule_name }}"
        source_zone: "{{ item.source_zone }}"
        destination_zone: "{{ item.destination_zone }}"
        source_ip: "{{ item.source_ip }}"
        destination_ip: "{{ item.destination_ip }}"
        application: "{{ item.application }}"
        service: "{{ item.service }}"
        action: "{{ item.action }}"
        description: "{{ item.description }}"
        tag_name: "{{ item.tag_name }}"
        commit: false
      loop: "{{ rules }}"
      when: not (all_security_rules.gathered | selectattr('rule_name', 'equalto', item.rule_name) | list | length > 0)
      register: security_rules_created

    - name: Display security rules creation status
      debug:
        msg: "Security rules processed: {{ security_rules_created.results | map(attribute='item.rule_name') | list }} - Created: {{ security_rules_created.results | selectattr('changed', 'equalto', true) | map(attribute='item.rule_name') | list }}"

    # ============================================================
    # STEP 7: COMMIT CHANGES TO PANORAMA
    # ============================================================
    - name: Commit changes to Panorama
      paloaltonetworks.panos.panos_commit_panorama:
        provider: "{{ provider }}"
        description: "Auto-created policy objects and rules"
      register: panorama_commit_result

    - name: Display Panorama commit status
      debug:
        msg: >
          Panorama commit: 
          {{ 'Success' if panorama_commit_result.changed else 'No changes to commit' }}

    # ============================================================
    # STEP 8: PUSH CHANGES TO DEVICE GROUP
    # ============================================================
    - name: Push changes to device group
      paloaltonetworks.panos.panos_commit_push:
        provider: "{{ provider }}"
        style: "device group"
        name: "{{ panorama_device_group }}"
      register: device_group_push_result

    - name: Display device group push status
      debug:
        msg: >
          Device group '{{ panorama_device_group }}' push: 
          {{ 'Success' if device_group_push_result.changed else 'No changes to push' }}

    # ============================================================
    # SUMMARY
    # ============================================================
    - name: Policy Creation Summary
      debug:
        msg: |
          ========================================
          POLICY CREATION & DEPLOYMENT SUMMARY
          ========================================
          Source Object: {{ source_object_created.changed | default(false) }}
          Destination Object: {{ destination_object_created.changed | default(false) }}
          Source Group: {{ source_group_created.changed | default(false) }}
          Destination Group: {{ destination_group_created.changed | default(false) }}
          Application Group: {{ application_group_created.changed | default(false) }}
          Security Rules: {{ security_rules_created.results | selectattr('changed', 'equalto', true) | list | length }} created
          ========================================
          Panorama Commit: {{ panorama_commit_result.changed | default(false) }}
          Device Group Push: {{ device_group_push_result.changed | default(false) }}
          ========================================
