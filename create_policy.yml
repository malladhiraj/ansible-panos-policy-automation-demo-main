---
- hosts: all
  connection: local
  gather_facts: true
  name: Example Policy Creation Playbook

  vars:
    provider:
      ip_address: "{{ ansible_host }}"
      username: "{{ lookup('env', 'ANSIBLE_NET_USERNAME') }}"
      password: "{{ lookup('env', 'ANSIBLE_NET_PASSWORD') }}"

    policy_creation_policy_files: []
    default_new_policy_tag: AUTOMATED

  tasks:

    # Policy matching logic (unchanged)
    - name: Match Web Server to Database Tier
      ansible.builtin.set_fact:
        policy_match: true
        policy_name: "Match Web Server to Database Tier"
        source_address_group: >-
          {{ 'PRESET_WEB_TO_DATABASE_SOURCE'
             if (policy_creation_source_ip is defined and
                 policy_creation_destination_ip is defined and
                 policy_creation_source_ip.startswith('10.10.199') and
                 policy_creation_destination_ip.startswith('10.10.200'))
             else 'DEFAULT_SOURCE' }}
        destination_address_group: >-
          {{ 'PRESET_WEB_TO_DATABASE_DESTINATION'
             if (policy_creation_source_ip is defined and
                 policy_creation_destination_ip is defined and
                 policy_creation_source_ip.startswith('10.10.199') and
                 policy_creation_destination_ip.startswith('10.10.200'))
             else 'DEFAULT_DESTINATION' }}
        outer_application_group: >-
          {{ 'PRESET_WEB_TO_DATABASE'
             if (policy_creation_source_ip is defined and
                 policy_creation_destination_ip is defined and
                 policy_creation_source_ip.startswith('10.10.199') and
                 policy_creation_destination_ip.startswith('10.10.200'))
             else 'DEFAULT_APPLICATION' }}
        policy_rules:
          - name: "{{ policy_name }}"
            from: "any"
            to: "any"
            src: "{{ source_address_group }}"
            dst: "{{ destination_address_group }}"
            app:
              - "{{ outer_application_group }}"
            svc:
              - "any"
            action: "allow"

    # Policy creation role (unchanged)
    - name: Include a role dynamically
      ansible.builtin.include_role:
        name: paloaltonetworks.panos_policy_automation.policy_creation
      vars:
        policy_creation_policies: "{{ policy_rules }}"
        policy_creation_source_address_group: "{{ source_address_group }}"
        policy_creation_destination_address_group: "{{ destination_address_group }}"
        policy_creation_policy_match: "{{ policy_match }}"
        application_group: "{{ outer_application_group }}"
        policy_creation_device_group: "{{ device_group }}"
        commit: false

    # ✅ CORRECTED: Panorama device-group + rulebase aware rule existence check
    - name: Check if "Match Web Server to Database Tier" rule exists in Panorama device group
      paloaltonetworks.panos.panos_security_rule_facts:
        provider: "{{ provider }}"
        device_group: "{{ device_group }}"
        rulebase: pre-rulebase
        names:
          - "Match Web Server to Database Tier"
      register: security_rule_facts

    # Rule creation logic (unchanged, now correctly gated)
    - name: Create or update security rule
      paloaltonetworks.panos.panos_security_rule:
        provider: "{{ provider }}"
        state: present
        device_group: "{{ device_group }}"
        rulebase: pre-rulebase
        rule_name: "{{ policy_name }}"
        source_zone: ['any']
        destination_zone: ['any']
        source_address:
          - "{{ source_address_group }}"
        destination_address:
          - "{{ destination_address_group }}"
        application:
          - "{{ outer_application_group }}"
        service:
          - "any"
        action: "allow"
        commit: false
      when: security_rule_facts.matched_rules | length == 0